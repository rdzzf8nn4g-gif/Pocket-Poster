name: Build Pocket Poster IPA

on:
  
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 【修复点】使用官方推荐的 action 自动配置 Xcode 环境，彻底告别路径报错
      - name: Set up Xcode environment
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2' # 如果将来需要升降级，直接改这里的数字即可（如 '15.4', '16.0'）

      - name: Make Build Script Executable
        run: chmod +x ./ipabuild.sh 

      - name: Run IPA Build Script (Release)
        run: ./ipabuild.sh 

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pocket-Poster-IPA 
          path: build/*.ipa 
          retention-days: 7
